services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      SQLITE_PATH: /data/sprint_health.db
    volumes:
      - sprint_data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sprint_data:
