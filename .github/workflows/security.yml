name: Security and Static Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  sast-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Bandit (SAST)
        run: |
          # Exclude tests and venv from generic AST parsing rules
          bandit -r app/ api/ dashboard.py admin_dashboard.py -ll -ii

      - name: Run Dependency Audit
        run: |
          pip-audit --requirement requirements.txt --ignore-vuln PYSEC-2022-43012 || true
          # Continue on error so we can still see test results if a deeply-nested dependency has an issue

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pytest
        env:
          SECRET_KEY: ci-test-secret-key-16-bytes
          JIRA_EMAIL: test@example.com
          JIRA_API_TOKEN: dummy
          JIRA_PROJECT_KEY: PM
          API_KEY: ci-test-api-key
        run: |
          pytest tests/ -v
